services:
  - type: web
    name: onetaskaday
    runtime: node
    plan: starter
    region: oregon
    repo: https://github.com/Matt-Aero/onetaskaday
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.13.0
      - key: DATABASE_PATH
        value: /var/data/one.db
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: SUPPORT_EMAIL
        value: support@onetaskaday.app
      - key: APP_SERVER_URL
        value: https://onetaskaday.com
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 5
